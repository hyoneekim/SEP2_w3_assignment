version: '3.8'

services:
  db:
    image: mariadb:11
    container_name: shopping-cart-db
    command: --lower-case-table-names=1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: shopping_cart_localization
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: hyoneekim/shopping-cart:latest
    platform: linux/arm64
    container_name: shopping-cart-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: shopping_cart_localization
      DB_USER: root
      DB_PASSWORD: root_password
      DISPLAY: host.docker.internal:0
      LIBGL_ALWAYS_SOFTWARE: "1"
      JAVA_TOOL_OPTIONS: "-Dprism.order=sw -Djavafx.platform=gtk"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix

volumes:
  db_data: